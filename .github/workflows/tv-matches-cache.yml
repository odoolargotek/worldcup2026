name: TV Matches Cache

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch matches from streamtp
        run: |
          mkdir -p public/data
          curl -s -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36" \
            -H "Accept: application/json" \
            "https://streamtp.top/api/matches.json" \
            -o public/data/matches.json \
          || echo '{"matches":[],"count":0}' > public/data/matches.json

      - name: Validate JSON
        run: |
          python3 -c "
import json, sys
try:
    d = json.load(open('public/data/matches.json'))
    arr = d.get('matches', d) if isinstance(d, dict) else d
    print('OK:', len(arr), 'partidos')
except Exception as e:
    print('JSON invalido:', e)
    sys.exit(1)
" || echo '{"matches":[],"count":0}' > public/data/matches.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches.json
          git diff --cached --quiet || git commit -m "chore: update matches cache [skip ci]"
          git push origin main
