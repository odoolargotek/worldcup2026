name: TV Matches Cache

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch and validate matches
        run: |
          mkdir -p public/data
          curl -s -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            "https://streamtp.top/api/matches.json" \
            -o public/data/matches.json
          python3 -c "import json; d=open('public/data/matches.json').read(); json.loads(d); print('JSON OK')" \
            || echo '{"matches":[],"count":0}' > public/data/matches.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches.json
          git diff --cached --quiet || git commit -m "chore: update matches cache [skip ci]"
          git push origin main

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: worldcup2026-c12af
