<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte de Pronósticos — WC2026</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .kpi-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 18px 14px;
      text-align: center;
    }
    .kpi-val  { font-size: 2rem; font-weight: 800; line-height: 1.1; }
    .kpi-lbl  { font-size: 11px; color: var(--text-muted, #94a3b8); margin-top: 4px; }

    .section-hdr {
      font-size: 11px; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase; color: #4aafd4;
      padding: 22px 0 10px;
      border-bottom: 1px solid rgba(74,175,212,0.2);
      margin-bottom: 14px;
    }

    /* Tabla principal */
    .rpt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .rpt-table th {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-muted, #94a3b8);
      padding: 6px 10px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .rpt-table td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .rpt-table tbody tr:hover { background: rgba(255,255,255,0.03); }

    /* Badges de resultado */
    .badge-exact  { background:rgba(245,158,11,0.15); color:#f59e0b; border-radius:20px; padding:2px 10px; font-size:11px; font-weight:700; white-space:nowrap; }
    .badge-result { background:rgba(52,211,153,0.12); color:#34d399; border-radius:20px; padding:2px 10px; font-size:11px; font-weight:700; white-space:nowrap; }
    .badge-miss   { background:rgba(239,68,68,0.10);  color:#f87171; border-radius:20px; padding:2px 10px; font-size:11px; font-weight:700; white-space:nowrap; }
    .badge-pend   { background:rgba(148,163,184,0.08); color:#94a3b8; border-radius:20px; padding:2px 10px; font-size:11px; font-weight:700; white-space:nowrap; }

    /* Barra de porcentaje */
    .pct-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius:6px; margin-top:4px; }
    .pct-fill { height: 6px; border-radius:6px; transition: width .4s; }

    /* Tabs de grupo */
    .group-tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
    .gtab {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted, #94a3b8);
      border-radius: 20px; padding: 4px 16px;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .gtab.active, .gtab:hover {
      background: rgba(74,175,212,0.15);
      border-color: #4aafd4; color: #4aafd4;
    }

    .player-row {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .player-name { font-weight: 700; font-size: 14px; }
    .stat-pill {
      display: inline-block;
      border-radius: 20px; padding: 3px 12px;
      font-size: 12px; font-weight: 700;
    }

    #loader { color:var(--text-muted);text-align:center;padding:60px;font-size:14px; }

    @media(max-width:576px) {
      .rpt-table th:nth-child(n+5),
      .rpt-table td:nth-child(n+5) { display:none; }
    }
  </style>
</head>
<body>

  <nav class="navbar" style="background:linear-gradient(135deg,#0f1a2d,#1a2d4a)!important;border-color:#a78bfa">
    <div class="navbar-brand">
      <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
      <div>
        <div>📊 Reporte de Pronósticos</div>
        <div class="navbar-powered">Pronósticos vs Resultado Real</div>
      </div>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <button id="btnRefresh" class="btn btn-sm btn-outline-light">🔄 Actualizar</button>
      <a href="admin.html" class="btn btn-outline-light btn-sm">🛠️ Admin</a>
    </div>
  </nav>

  <div class="container py-4" style="max-width:1100px">

    <div id="loader">⏳ Cargando datos...</div>
    <div id="reportContent" style="display:none">

      <!-- KPIs globales -->
      <div class="section-hdr">🌎 Resumen Global</div>
      <div class="row g-3 mb-4" id="kpiGlobal"></div>

      <!-- Tabla global por partido (partidos jugados) -->
      <div class="section-hdr">⚽ Partidos jugados — aciertos y fallas</div>
      <div style="overflow-x:auto;margin-bottom:28px">
        <table class="rpt-table" id="tblMatches">
          <thead>
            <tr>
              <th>Partido</th>
              <th>Fase</th>
              <th style="text-align:center">Resultado</th>
              <th style="text-align:center">Pronósticos</th>
              <th style="text-align:center">🟡 Exacto (6pts)</th>
              <th style="text-align:center">🟢 Ganador (3pts)</th>
              <th style="text-align:center">🔴 Fallo (0pts)</th>
              <th style="text-align:center">📊 Acierto %</th>
            </tr>
          </thead>
          <tbody id="tblMatchesBody"></tbody>
        </table>
      </div>

      <!-- Reporte por grupo/comparsa -->
      <div class="section-hdr">🏆 Reporte por Comparsa</div>
      <div class="group-tabs" id="groupTabs"></div>
      <div id="groupReport"></div>

    </div>
  </div>

  <div class="footer-brand">
    <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
    Largotek Transformación Digital
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/admin-report.js"></script>

</body>
</html>
