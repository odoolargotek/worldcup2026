<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-dark bg-success px-3">
    <span class="navbar-brand">⚽ WC2026</span>
    <div class="d-flex align-items-center gap-2">
      <span id="userDisplayName" class="small"></span>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">Salir</button>
    </div>
  </nav>

  <div class="container py-4">
    <h4>Mis Grupos</h4>

    <!-- Crear grupo -->
    <div class="card bg-secondary p-3 mb-3">
      <h6>Crear nuevo grupo</h6>
      <div class="input-group">
        <input type="text" id="newGroupName" class="form-control" placeholder="Nombre del grupo">
        <button id="createGroupBtn" class="btn btn-success">Crear</button>
      </div>
    </div>

    <!-- Unirse a grupo -->
    <div class="card bg-secondary p-3 mb-3">
      <h6>Unirse con código</h6>
      <div class="input-group">
        <input type="text" id="joinCode" class="form-control" placeholder="Código de invitación">
        <button id="joinGroupBtn" class="btn btn-primary">Unirse</button>
      </div>
    </div>

    <!-- Lista de grupos -->
    <h5>Grupos activos</h5>
    <div id="groupList" class="row g-3">
      <!-- Cards generadas dinámicamente por groups.js -->
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/groups.js"></script>
</body>
</html>
