<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
      <div>
        <div>⚽ WC2026 — Polla Mundialera</div>
        <div class="navbar-powered">by Largotek Transformación Digital</div>
      </div>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span id="userDisplayName" class="small" style="color:var(--text-muted)"></span>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">Salir</button>
    </div>
  </nav>

  <div class="container py-4">

    <div class="row g-3 mb-4">
      <!-- Crear comparsa -->
      <div class="col-md-6">
        <div class="card p-3">
          <h6 style="color:var(--green-light);font-weight:700">➕ Crear nueva comparsa</h6>
          <div class="input-group mt-2">
            <input type="text" id="newGroupName" class="form-control" placeholder="Nombre de la comparsa">
            <button id="createGroupBtn" class="btn btn-success px-3">Crear</button>
          </div>
        </div>
      </div>
      <!-- Unirse -->
      <div class="col-md-6">
        <div class="card p-3">
          <h6 style="color:var(--gold);font-weight:700">🔗 Unirse con código</h6>
          <div class="input-group mt-2">
            <input type="text" id="joinCode" class="form-control" placeholder="Código de invitación" style="text-transform:uppercase">
            <button id="joinGroupBtn" class="btn btn-warning px-3">Unirse</button>
          </div>
        </div>
      </div>
    </div>

    <h5 style="color:var(--text-muted);font-size:0.85rem;text-transform:uppercase;letter-spacing:1px" class="mb-3">🏆 Mis Comparsas</h5>
    <div id="groupList" class="row g-3"></div>

  </div>

  <div class="footer-brand">
    ⚽ WC2026 — Polla Mundialera &nbsp;|
    <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
    Largotek Transformación Digital
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/groups.js"></script>
</body>
</html>
