<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Polla Mundialera</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh">

  <div class="login-card">
    <div class="text-center mb-1">
      <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1"
           alt="Largotek" class="login-logo">
    </div>
    <div class="text-center">
      <div class="login-title">⚽ WC2026</div>
      <div class="login-sub">Polla Mundialera &mdash; FIFA World Cup</div>
    </div>

    <ul class="nav nav-tabs mb-4" id="authTabs">
      <li class="nav-item flex-fill">
        <button class="nav-link active w-100" data-tab="login">Iniciar sesión</button>
      </li>
      <li class="nav-item flex-fill">
        <button class="nav-link w-100" data-tab="register">Registrarse</button>
      </li>
    </ul>

    <!-- Login -->
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="tu@correo.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2">Entrar →</button>
    </form>

    <!-- Registro -->
    <form id="registerForm" class="d-none">
      <div class="mb-3">
        <label class="form-label">Apodo</label>
        <input type="text" id="regName" class="form-control" placeholder="Tu apodo en la polla" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="regEmail" class="form-control" placeholder="tu@correo.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <input type="password" id="regPassword" class="form-control" placeholder="Mín. 6 caracteres" required>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2">Crear cuenta →</button>
    </form>

    <div id="authError" class="alert alert-danger mt-3 d-none small"></div>

    <div class="powered-by">
      Desarrollado por
      <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
      Largotek — Transformación Digital
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
