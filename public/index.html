<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 — Polla Mundialera</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center vh-100">

  <div class="card bg-secondary text-light p-4 shadow" style="width:380px">
    <div class="text-center mb-3">
      <h2>⚽ WC2026</h2>
      <p class="text-muted small">Polla Mundialera</p>
    </div>

    <!-- Tabs Login / Registro -->
    <ul class="nav nav-tabs mb-3" id="authTabs">
      <li class="nav-item">
        <button class="nav-link active text-light" data-tab="login">Iniciar sesión</button>
      </li>
      <li class="nav-item">
        <button class="nav-link text-light" data-tab="register">Registrarse</button>
      </li>
    </ul>

    <!-- Login -->
    <form id="loginForm">
      <div class="mb-2">
        <input type="email" id="loginEmail" class="form-control" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" id="loginPassword" class="form-control" placeholder="Contraseña" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Entrar</button>
    </form>

    <!-- Registro (oculto por defecto) -->
    <form id="registerForm" class="d-none">
      <div class="mb-2">
        <input type="text" id="regName" class="form-control" placeholder="Nombre" required>
      </div>
      <div class="mb-2">
        <input type="email" id="regEmail" class="form-control" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" id="regPassword" class="form-control" placeholder="Contraseña (mín. 6 chars)" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Crear cuenta</button>
    </form>

    <div id="authError" class="alert alert-danger mt-3 d-none small"></div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
