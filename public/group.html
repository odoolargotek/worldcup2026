<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparsa — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
      <div>
        <div>⚽ <span id="groupNameNav">Comparsa</span></div>
        <div class="navbar-powered">by Largotek</div>
      </div>
    </div>
    <div class="d-flex gap-2">
      <a href="dashboard.html" class="btn btn-outline-light btn-sm">← Mis comparsas</a>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">Salir</button>
    </div>
  </nav>

  <div class="container py-4">

    <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded" style="background:var(--bg-card);border:1px solid var(--border)">
      <div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Código de invitación</div>
        <div style="font-size:1.4rem;font-weight:800;color:var(--gold);letter-spacing:4px" id="groupCodeDisplay"></div>
      </div>
      <button id="copyCodeBtn" class="btn btn-outline-light btn-sm ms-auto">📋 Copiar y compartir</button>
    </div>

    <ul class="nav nav-tabs mb-4">
      <li class="nav-item">
        <button class="nav-link active" data-tab="ranking">🏆 Ranking</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-tab="matches">📅 Partidos</button>
      </li>
    </ul>

    <div id="rankingTab">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr><th>#</th><th>Apodo</th><th>Puntos</th><th>Exactos</th></tr>
          </thead>
          <tbody id="rankingBody">
            <tr><td colspan="4" class="text-center" style="color:var(--text-muted)">Sin pronósticos aún...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="matchesTab" class="d-none">
      <div id="matchList">
        <div class="text-center py-4" style="color:var(--text-muted)">Cargando partidos...</div>
      </div>
    </div>

  </div>

  <div class="footer-brand">
    ⚽ WC2026 — Polla Mundialera &nbsp;|
    <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
    Largotek Transformación Digital
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/matches.js"></script>
  <script type="module" src="js/standings.js"></script>
</body>
</html>
