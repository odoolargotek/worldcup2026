<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-dark bg-success px-3">
    <a href="dashboard.html" class="navbar-brand">← WC2026</a>
    <span id="groupNameNav" class="text-light small"></span>
    <button id="logoutBtn" class="btn btn-outline-light btn-sm">Salir</button>
  </nav>

  <div class="container py-4">

    <!-- Código de invitación -->
    <div class="alert alert-secondary d-flex justify-content-between align-items-center">
      <span>Código del grupo: <strong id="groupCodeDisplay"></strong></span>
      <button id="copyCodeBtn" class="btn btn-sm btn-outline-light">📋 Copiar</button>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <button class="nav-link active text-light" data-tab="ranking">🏆 Ranking</button>
      </li>
      <li class="nav-item">
        <button class="nav-link text-light" data-tab="matches">📅 Partidos</button>
      </li>
    </ul>

    <!-- Ranking -->
    <div id="rankingTab">
      <table class="table table-dark table-striped">
        <thead>
          <tr><th>#</th><th>Participante</th><th>Puntos</th><th>Exactos</th></tr>
        </thead>
        <tbody id="rankingBody">
          <!-- standings.js -->
        </tbody>
      </table>
    </div>

    <!-- Partidos -->
    <div id="matchesTab" class="d-none">
      <div id="matchList">
        <!-- matches.js -->
      </div>
    </div>

  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/matches.js"></script>
  <script type="module" src="js/standings.js"></script>
</body>
</html>
