<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes de Bienvenida — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .msg-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px; margin-bottom:14px; }
    .badge-active   { background:rgba(52,211,153,0.15); color:#34d399; border:1px solid rgba(52,211,153,0.3); border-radius:20px; padding:3px 12px; font-size:11px; font-weight:800; }
    .badge-inactive { background:rgba(148,163,184,0.1); color:#94a3b8; border:1px solid rgba(148,163,184,0.2); border-radius:20px; padding:3px 12px; font-size:11px; font-weight:700; }
    .badge-user     { background:rgba(167,139,250,0.12); color:#a78bfa; border:1px solid rgba(167,139,250,0.3); border-radius:20px; padding:3px 12px; font-size:11px; font-weight:800; }
    .badge-global   { background:rgba(74,175,212,0.12); color:#4aafd4; border:1px solid rgba(74,175,212,0.3); border-radius:20px; padding:3px 12px; font-size:11px; font-weight:800; }
    textarea.msg-input { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:#f1f5f9; border-radius:8px; width:100%; padding:10px 12px; font-size:14px; resize:vertical; min-height:90px; }
    textarea.msg-input:focus { outline:none; border-color:#4aafd4; }
    input.msg-input { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:#f1f5f9; border-radius:8px; width:100%; padding:9px 12px; font-size:14px; }
    input.msg-input:focus { outline:none; border-color:#4aafd4; }
    select.msg-input { background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); color:#f1f5f9; border-radius:8px; width:100%; padding:9px 12px; font-size:14px; }
    select.msg-input:focus { outline:none; border-color:#4aafd4; }
    .section-hdr { font-weight:800; font-size:0.95rem; color:var(--gold,#f59e0b); margin:24px 0 12px; letter-spacing:.5px; text-transform:uppercase; font-size:12px; }
    .del-btn { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#f87171; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:700; cursor:pointer; }
    .del-btn:hover { background:rgba(239,68,68,0.2); }
    .toggle-btn { background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.25); color:#34d399; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:700; cursor:pointer; }
    .toggle-btn.off { background:rgba(148,163,184,0.08); border-color:rgba(148,163,184,0.2); color:#94a3b8; }
  </style>
</head>
<body>
  <nav class="navbar" style="background:linear-gradient(135deg,#1a0533,#2d1b69)!important;border-color:#a78bfa">
    <div class="navbar-brand">
      <div>
        <div>💬 Mensajes de Bienvenida</div>
        <div class="navbar-powered">WC2026 Admin</div>
      </div>
    </div>
    <div class="d-flex gap-2">
      <a href="admin.html" class="btn btn-outline-light btn-sm">🛠️ Admin</a>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm d-none">Salir</button>
    </div>
  </nav>

  <div class="container py-4" style="max-width:860px">

    <!-- CREAR NUEVO MENSAJE -->
    <div class="msg-card" style="border-color:rgba(167,139,250,0.3)">
      <div style="font-weight:800;font-size:1rem;color:#a78bfa;margin-bottom:16px">➕ Crear nuevo mensaje</div>

      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label style="font-size:12px;color:var(--text-muted);font-weight:700">TÍTULO (opcional)</label>
          <input id="newTitle" class="msg-input" placeholder="Ej: ¡Bienvenido al Mundial 2026!">
        </div>
        <div class="col-12 col-md-3">
          <label style="font-size:12px;color:var(--text-muted);font-weight:700">TIPO</label>
          <select id="newType" class="msg-input" onchange="handleTypeChange()">
            <option value="global">🌐 Global (todos)</option>
            <option value="user">👤 Usuario específico</option>
          </select>
        </div>
        <div class="col-12 col-md-3" id="userSelectWrap" style="display:none">
          <label style="font-size:12px;color:var(--text-muted);font-weight:700">USUARIO</label>
          <select id="newUser" class="msg-input">
            <option value="">⏳ Cargando...</option>
          </select>
        </div>
      </div>

      <div style="margin-top:12px">
        <label style="font-size:12px;color:var(--text-muted);font-weight:700">MENSAJE *</label>
        <textarea id="newBody" class="msg-input" placeholder="Escribe el mensaje que verá el usuario al ingresar…"></textarea>
      </div>

      <div class="row g-3 mt-1">
        <div class="col-12 col-md-4">
          <label style="font-size:12px;color:var(--text-muted);font-weight:700">EMOJI / ÍCONO (opcional)</label>
          <input id="newEmoji" class="msg-input" placeholder="🏆" maxlength="4" style="font-size:1.5rem;text-align:center">
        </div>
        <div class="col-12 col-md-4">
          <label style="font-size:12px;color:var(--text-muted);font-weight:700">MOSTRAR HASTA (opcional)</label>
          <input id="newExpiry" class="msg-input" type="date">
        </div>
        <div class="col-12 col-md-4 d-flex align-items-end">
          <button id="btnCreate" class="btn w-100" style="background:linear-gradient(135deg,#6d28d9,#a78bfa);color:#fff;font-weight:800;padding:10px">
            💾 Guardar mensaje
          </button>
        </div>
      </div>
      <div id="createLog" style="margin-top:10px;font-size:13px"></div>
    </div>

    <!-- LISTA DE MENSAJES -->
    <div class="section-hdr">📋 Mensajes configurados</div>
    <div id="loader" style="text-align:center;padding:30px;color:var(--text-muted)">⏳ Cargando mensajes…</div>
    <div id="msgList"></div>

  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/admin-messages.js"></script>
  <script>
    function handleTypeChange() {
      const t = document.getElementById('newType').value;
      document.getElementById('userSelectWrap').style.display = t === 'user' ? 'block' : 'none';
    }
  </script>
</body>
</html>
