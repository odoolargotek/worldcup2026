<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bracket Mundial 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .bracket-wrap { overflow-x: auto; padding: 12px 8px 24px; }
    .bracket-grid {
      display: grid;
      grid-template-columns: 200px 140px 100px 80px 60px 80px 100px 140px 200px;
      grid-template-rows: repeat(16, 56px);
      gap: 4px 0;
      min-width: 900px;
    }
    .match-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 4px 8px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      display: flex; flex-direction: column; justify-content: center; gap: 2px;
      margin: 2px 4px;
    }
    .match-card:hover { border-color: var(--gold); transform: scale(1.02); }
    .match-card.locked { opacity: .55; cursor: default; }
    .match-card.has-pred { border-color: #22c55e; }
    .match-card.finished { border-color: var(--gold); }
    .team-row {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden;
    }
    .team-row .flag { font-size: 15px; flex-shrink: 0; }
    .team-row .name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .team-row .score-box {
      background: rgba(255,255,255,.08); border-radius: 4px;
      padding: 1px 5px; font-size: 12px; font-weight: 800;
      min-width: 20px; text-align: center; flex-shrink: 0;
    }
    .team-row.winner .name { color: var(--gold); }
    .team-row.winner .score-box { background: rgba(250,189,0,.2); color: var(--gold); }
    .connector-v { width: 2px; background: var(--border); margin: 0 auto; height: 100%; }
    .connector-h { height: 2px; background: var(--border); width: 100%; align-self: center; }
    .pred-modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
    }
    .pred-modal {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 28px 24px; width: 320px; max-width: 95vw;
    }
    .score-input {
      width: 60px; text-align: center; font-size: 1.5rem; font-weight: 800;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 6px;
    }
    .score-input:focus { outline: none; border-color: var(--gold); }
    .round-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); text-align: center; padding: 4px 0 8px;
    }
    .trophy-cell { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .oct-slot {
      background: var(--bg-card);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      display: flex; flex-direction: column; justify-content: center; gap: 3px;
      padding: 4px 8px;
      margin: 2px 4px;
      font-size: 11px;
    }
    .oct-slot.has-team { border-style: solid; border-color: rgba(74,175,212,0.5); }
    .oct-slot.finished-oct { border-color: var(--gold); }
    .oct-slot .oct-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    .oct-slot .oct-team { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; }
    .oct-slot .oct-team .flag { font-size: 14px; flex-shrink: 0; }
    .oct-slot .oct-team .name { overflow: hidden; text-overflow: ellipsis; }
    .oct-slot .oct-team.winner .name { color: var(--gold); font-weight: 800; }
    @media (max-width: 600px) { .team-row .name { max-width: 70px; } }
  </style>
</head>
<body>
<div class="container-fluid py-3">
  <div class="d-flex align-items-center gap-3 mb-3 px-2">
    <a id="backLink" href="group.html" class="btn btn-sm" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text)">← Grupo</a>
    <h5 class="mb-0 fw-800" style="color:var(--gold)">🏆 Bracket Mundial 2026</h5>
  </div>
  <div id="authMsg" class="text-center py-4" style="color:var(--text-muted);display:none">🔒 Iniciá sesión para pronosticar</div>
  <div id="loadMsg" class="text-center py-4" style="color:var(--text-muted)">⏳ Cargando bracket...</div>
  <div id="bracketWrap" class="bracket-wrap" style="display:none">
    <div class="round-label mb-2" style="text-align:left;padding-left:8px">← Presioná cualquier partido para pronosticar</div>
    <div id="bracketGrid" class="bracket-grid"></div>
  </div>
  <div id="legend" style="display:none" class="d-flex gap-3 flex-wrap px-2 mt-3">
    <span style="font-size:12px;color:var(--text-muted)"><span style="display:inline-block;width:12px;height:12px;border:1.5px solid #22c55e;border-radius:3px;margin-right:4px"></span>Ya pronosticaste</span>
    <span style="font-size:12px;color:var(--text-muted)"><span style="display:inline-block;width:12px;height:12px;border:1.5px solid var(--gold);border-radius:3px;margin-right:4px"></span>Partido terminado</span>
    <span style="font-size:12px;color:var(--text-muted)"><span style="display:inline-block;width:12px;height:12px;border:1.5px solid var(--border);border-radius:3px;opacity:.5;margin-right:4px"></span>Bloqueado</span>
  </div>
</div>

<!-- Modal predicción -->
<div id="predModalBg" class="pred-modal-bg" style="display:none">
  <div class="pred-modal">
    <div id="modalPhase" style="font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:8px"></div>
    <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
      <div class="text-center">
        <div id="modalHomeFlag" style="font-size:2rem"></div>
        <div id="modalHomeName" style="font-size:12px;font-weight:700;color:var(--text);max-width:90px;text-align:center"></div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <input id="modalHomeScore" type="number" min="0" max="20" class="score-input" placeholder="0">
        <span style="font-size:1.2rem;color:var(--text-muted)">–</span>
        <input id="modalAwayScore" type="number" min="0" max="20" class="score-input" placeholder="0">
      </div>
      <div class="text-center">
        <div id="modalAwayFlag" style="font-size:2rem"></div>
        <div id="modalAwayName" style="font-size:12px;font-weight:700;color:var(--text);max-width:90px;text-align:center"></div>
      </div>
    </div>
    <div id="modalKickoff" style="font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:4px"></div>
    <div id="modalCity" style="font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:12px"></div>
    <div id="modalMsg" style="min-height:20px;text-align:center;font-size:13px;margin-bottom:8px"></div>
    <div class="d-flex gap-2">
      <button id="modalCancel" class="btn btn-sm flex-fill" style="background:var(--bg);border:1px solid var(--border);color:var(--text)">Cancelar</button>
      <button id="modalSave" class="btn btn-sm fw-bold flex-fill" style="background:var(--gold);color:#000">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- Chat flotante -->
<script type="module" src="js/chat-widget.js"></script>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import {
  collection, getDocs, doc, setDoc, query, where
} from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const params = new URLSearchParams(location.search);
const GID    = params.get('gid') || '';
document.getElementById('backLink').href = `group.html?gid=${GID}`;

function getKickoff(m) {
  if (!m?.kickoff) return null;
  return m.kickoff.toDate ? m.kickoff.toDate() : new Date(m.kickoff);
}

const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
function makeKey(h, a) { return [h,a].map(norm).sort().join('|'); }

function isPlaceholder(name) {
  if (!name) return true;
  const n = norm(name);
  return n === '' || n === 'tbc' || n.includes('grup') || n.includes('mejor') ||
         n.includes('ganador') || n.includes('por definir') || n.startsWith('1') || n.startsWith('2');
}

const R32_ORDER = [
  { side:'L', slot:1, homeHint:'Alemania',       awayHint:'Paraguay' },
  { side:'L', slot:2, homeHint:'Francia',         awayHint:'Suecia' },
  { side:'L', slot:3, homeHint:'Sudáfrica',       awayHint:'Canadá' },
  { side:'L', slot:4, homeHint:'Países Bajos',    awayHint:'Marruecos' },
  { side:'L', slot:5, homeHint:'Portugal',        awayHint:'Croacia' },
  { side:'L', slot:6, homeHint:'España',          awayHint:'Austria' },
  { side:'L', slot:7, homeHint:'Estados Unidos',  awayHint:'Bosnia y Herzegovina' },
  { side:'L', slot:8, homeHint:'Bélgica',         awayHint:'Senegal' },
  { side:'R', slot:1, homeHint:'Brasil',          awayHint:'Japón' },
  { side:'R', slot:2, homeHint:'Costa de Marfil', awayHint:'Noruega' },
  { side:'R', slot:3, homeHint:'México',          awayHint:'Ecuador' },
  { side:'R', slot:4, homeHint:'Inglaterra',      awayHint:'RD Congo' },
  { side:'R', slot:5, homeHint:'Argentina',       awayHint:'Cabo Verde' },
  { side:'R', slot:6, homeHint:'Australia',       awayHint:'Egipto' },
  { side:'R', slot:7, homeHint:'Suiza',           awayHint:'Argelia' },
  { side:'R', slot:8, homeHint:'Colombia',        awayHint:'Ghana' },
];

const R32_PAIRS = {
  'L0': [ R32_ORDER[0],  R32_ORDER[1]  ],
  'L1': [ R32_ORDER[2],  R32_ORDER[3]  ],
  'L2': [ R32_ORDER[4],  R32_ORDER[5]  ],
  'L3': [ R32_ORDER[6],  R32_ORDER[7]  ],
  'R0': [ R32_ORDER[8],  R32_ORDER[9]  ],
  'R1': [ R32_ORDER[10], R32_ORDER[11] ],
  'R2': [ R32_ORDER[12], R32_ORDER[13] ],
  'R3': [ R32_ORDER[14], R32_ORDER[15] ],
};

function getWinnerFromR32(m) {
  if (!m || !m.finished) return null;
  if (m.home_score == null) return null;
  if (m.home_score > m.away_score) return { team: m.home_team, flag: m.home_flag || '' };
  if (m.away_score > m.home_score) return { team: m.away_team, flag: m.away_flag || '' };
  if (m.pen_home_score !== undefined) {
    return m.pen_home_score > m.pen_away_score
      ? { team: m.home_team, flag: m.home_flag || '' }
      : { team: m.away_team, flag: m.away_flag || '' };
  }
  return null;
}

let currentUser = null;
let allMatches  = [];
let predictions = {};
let matchMap    = {};
let octavosMap  = {};

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (!user) document.getElementById('authMsg').style.display = '';
  await loadBracket();
});

async function loadBracket() {
  const snap = await getDocs(collection(db, 'matches'));
  allMatches = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  const r32 = allMatches.filter(m => {
    const t = norm(m.type||''); const p = norm(m.phase||'');
    return t.includes('ronda_32')||t.includes('ronda32')||p.includes('32');
  });
  const octavos = allMatches.filter(m => {
    const t = norm(m.type||''); const p = norm(m.phase||'');
    return t.includes('octavo') || p.includes('octavo') || p === '8vos';
  });

  for (const m of r32) {
    const key = makeKey(m.home_team, m.away_team);
    matchMap[key] = m;
  }

  const octL = octavos
    .filter(m => norm(m.side||'') === 'l' || (m.slot_key||'').startsWith('L'))
    .sort((a,b) => getKickoff(a) - getKickoff(b));
  const octR = octavos
    .filter(m => norm(m.side||'') === 'r' || (m.slot_key||'').startsWith('R'))
    .sort((a,b) => getKickoff(a) - getKickoff(b));

  if (!octL.length && !octR.length && octavos.length) {
    const sorted = [...octavos].sort((a,b) => getKickoff(a) - getKickoff(b));
    const half   = Math.ceil(sorted.length / 2);
    sorted.slice(0, half).forEach((m,i) => { octavosMap['L'+i] = m; });
    sorted.slice(half).forEach((m,i)  => { octavosMap['R'+i] = m; });
  } else {
    octL.forEach((m,i) => { octavosMap['L'+i] = m; });
    octR.forEach((m,i) => { octavosMap['R'+i] = m; });
  }

  if (currentUser && GID) {
    const pSnap = await getDocs(query(collection(db,'predictions'),
      where('user_uid','==',currentUser.uid),
      where('group_id','==',GID)
    ));
    pSnap.forEach(d => { predictions[d.data().match_id] = d.data(); });
  }

  renderBracket();
  document.getElementById('loadMsg').style.display = 'none';
  document.getElementById('bracketWrap').style.display = '';
  document.getElementById('legend').style.display = '';
}

function renderBracket() {
  const grid = document.getElementById('bracketGrid');
  grid.innerHTML = '';

  R32_ORDER.filter(e => e.side==='L').forEach(entry => {
    const row  = (entry.slot - 1) * 2 + 1;
    const key  = makeKey(entry.homeHint, entry.awayHint);
    const card = buildMatchCard(matchMap[key], entry.homeHint, entry.awayHint);
    card.style.gridColumn = 1;
    card.style.gridRow    = `${row} / span 2`;
    grid.appendChild(card);
  });

  for (let i = 0; i < 4; i++) {
    const row = i * 4 + 1;
    const vLine = document.createElement('div');
    vLine.className = 'connector-v';
    vLine.style.gridColumn = 2;
    vLine.style.gridRow    = `${row} / span 4`;
    grid.appendChild(vLine);
    [row, row+2].forEach(r => {
      const h = document.createElement('div');
      h.className = 'connector-h';
      h.style.gridColumn = 2;
      h.style.gridRow = r;
      grid.appendChild(h);
    });
  }

  for (let i = 0; i < 4; i++) {
    const sl = buildOctSlot(octavosMap['L'+i], R32_PAIRS['L'+i]);
    sl.style.gridColumn = 3;
    sl.style.gridRow    = `${i*4+2} / span 2`;
    grid.appendChild(sl);
  }

  for (let i = 0; i < 2; i++) {
    const v = document.createElement('div');
    v.className = 'connector-v';
    v.style.gridColumn = 4;
    v.style.gridRow    = `${i*8+2} / span 8`;
    grid.appendChild(v);
  }
  for (let i = 0; i < 2; i++) {
    const ph = buildPlaceholder('Cuartos');
    ph.style.gridColumn = 5;
    ph.style.gridRow    = `${i*8+5} / span 4`;
    grid.appendChild(ph);
  }

  const vSemiL = document.createElement('div');
  vSemiL.className = 'connector-v';
  vSemiL.style.gridColumn = 6;
  vSemiL.style.gridRow    = '5 / span 8';
  grid.appendChild(vSemiL);

  const trophy = document.createElement('div');
  trophy.className = 'trophy-cell';
  trophy.textContent = '🏆';
  trophy.style.gridColumn = 5;
  trophy.style.gridRow    = '5 / span 2';
  grid.appendChild(trophy);

  const finalPh = buildPlaceholder('FINAL', true);
  finalPh.style.gridColumn = '5';
  finalPh.style.gridRow    = '7 / span 4';
  finalPh.style.zIndex     = '2';
  finalPh.style.margin     = '0 2px';
  grid.appendChild(finalPh);

  for (let i = 0; i < 4; i++) {
    const v = document.createElement('div');
    v.className = 'connector-v';
    v.style.gridColumn = 8;
    v.style.gridRow    = `${i*4+1} / span 4`;
    grid.appendChild(v);
  }

  for (let i = 0; i < 4; i++) {
    const sl = buildOctSlot(octavosMap['R'+i], R32_PAIRS['R'+i]);
    sl.style.gridColumn = 7;
    sl.style.gridRow    = `${i*4+2} / span 2`;
    grid.appendChild(sl);
  }

  for (let i = 0; i < 2; i++) {
    const v = document.createElement('div');
    v.className = 'connector-v';
    v.style.gridColumn = 6;
    v.style.gridRow    = `${i*8+2} / span 8`;
    grid.appendChild(v);
  }
  for (let i = 0; i < 2; i++) {
    const ph = buildPlaceholder('Cuartos');
    ph.style.gridColumn = 5;
    ph.style.gridRow    = `${i*8+5} / span 4`;
    grid.appendChild(ph);
  }

  R32_ORDER.filter(e => e.side==='R').forEach(entry => {
    const row  = (entry.slot - 1) * 2 + 1;
    const key  = makeKey(entry.homeHint, entry.awayHint);
    const card = buildMatchCard(matchMap[key], entry.homeHint, entry.awayHint);
    card.style.gridColumn = 9;
    card.style.gridRow    = `${row} / span 2`;
    grid.appendChild(card);
  });
}

function buildOctSlot(octMatch, pairs) {
  const el = document.createElement('div');

  let homeTeam = null, homeFlag = '';
  let awayTeam = null, awayFlag = '';

  if (pairs && pairs[0]) {
    const r32m = matchMap[makeKey(pairs[0].homeHint, pairs[0].awayHint)];
    const w = getWinnerFromR32(r32m);
    if (w) { homeTeam = w.team; homeFlag = w.flag; }
  }
  if (pairs && pairs[1]) {
    const r32m = matchMap[makeKey(pairs[1].homeHint, pairs[1].awayHint)];
    const w = getWinnerFromR32(r32m);
    if (w) { awayTeam = w.team; awayFlag = w.flag; }
  }

  const isFinished = octMatch?.finished === true;
  if (isFinished && octMatch?.home_score != null && !isPlaceholder(octMatch?.home_team)) {
    homeTeam = octMatch.home_team; homeFlag = octMatch.home_flag || homeFlag;
    awayTeam = octMatch.away_team; awayFlag = octMatch.away_flag || awayFlag;
  }

  const hasHome = !!homeTeam;
  const hasAway = !!awayTeam;
  const hasBoth = hasHome && hasAway;

  let homeWinner = false, awayWinner = false;
  if (isFinished && octMatch?.home_score != null) {
    homeWinner = octMatch.home_score > octMatch.away_score;
    awayWinner = octMatch.away_score > octMatch.home_score;
  }

  if (!hasHome && !hasAway) {
    el.style.cssText = `
      background: var(--bg-card); border: 1.5px dashed var(--border);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      margin: 2px 4px; text-transform: uppercase; letter-spacing: 1px; opacity: .6;
    `;
    el.textContent = '8VOS';
    return el;
  }

  el.className = 'oct-slot' + (hasBoth ? ' has-team' : '') + (isFinished && !isPlaceholder(octMatch?.home_team) ? ' finished-oct' : '');

  const kickoff    = getKickoff(octMatch);
  const now        = new Date();
  const canPredict = octMatch && hasBoth && !isPlaceholder(octMatch?.home_team) && kickoff && kickoff > now && !isFinished && currentUser;

  el.innerHTML = `
    ${!hasBoth ? '<div class="oct-label">8VOS</div>' : ''}
    <div class="oct-team ${homeWinner?' winner':''}">
      <span class="flag">${homeFlag||'🏳️'}</span>
      <span class="name">${homeTeam || '?'}</span>
      ${isFinished && !isPlaceholder(octMatch?.home_team) ? `<span style="font-size:11px;font-weight:800;margin-left:auto">${octMatch.home_score}</span>` : ''}
    </div>
    <div class="oct-team ${awayWinner?' winner':''}">
      <span class="flag">${awayFlag||'🏳️'}</span>
      <span class="name">${awayTeam || '?'}</span>
      ${isFinished && !isPlaceholder(octMatch?.home_team) ? `<span style="font-size:11px;font-weight:800;margin-left:auto">${octMatch.away_score}</span>` : ''}
    </div>
    ${kickoff && hasBoth && !isFinished && !isPlaceholder(octMatch?.home_team) ? `<div style="font-size:9px;color:var(--text-muted);margin-top:1px">${kickoff.toLocaleString('es-BO',{timeZone:'America/La_Paz',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>` : ''}
  `;

  if (canPredict) {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => openModal(octMatch));
    const hasPred = !!predictions[octMatch.id];
    el.style.borderColor = hasPred ? '#22c55e' : 'rgba(74,175,212,0.5)';
    el.style.transition  = 'border-color .2s';
    el.addEventListener('mouseenter', () => { el.style.borderColor = 'var(--gold)'; });
    el.addEventListener('mouseleave', () => { el.style.borderColor = hasPred ? '#22c55e' : 'rgba(74,175,212,0.5)'; });
  }

  return el;
}

function buildMatchCard(m, homeHint, awayHint) {
  const card = document.createElement('div');
  card.className = 'match-card';

  const now        = new Date();
  const kickoff    = getKickoff(m);
  const isLocked   = !m || !kickoff || kickoff <= now || m.home_score !== undefined;
  const isFinished = m?.finished === true;
  const hasPred    = m && !!predictions[m.id];
  const pred       = hasPred ? predictions[m.id] : null;

  if (isFinished) card.classList.add('finished');
  else if (hasPred) card.classList.add('has-pred');
  else if (isLocked) card.classList.add('locked');

  const homeTeam = m?.home_team || homeHint;
  const awayTeam = m?.away_team || awayHint;
  const homeFlag = m?.home_flag || '🏳️';
  const awayFlag = m?.away_flag || '🏳️';

  let homeWinner = false, awayWinner = false;
  if (isFinished && m.home_score != null && m.away_score != null) {
    if (m.home_score > m.away_score) homeWinner = true;
    else if (m.away_score > m.home_score) awayWinner = true;
    else if (m.pen_home_score !== undefined) {
      homeWinner = m.pen_home_score > m.pen_away_score;
      awayWinner = !homeWinner;
    }
  }

  card.innerHTML = `
    <div class="team-row${homeWinner?' winner':''}">
      <span class="flag">${homeFlag}</span>
      <span class="name">${homeTeam}</span>
      ${isFinished ? `<span class="score-box">${m.home_score ?? '–'}</span>` : ''}
      ${hasPred && !isFinished ? `<span class="score-box" style="color:#86efac">${pred.home_score}</span>` : ''}
    </div>
    <div class="team-row${awayWinner?' winner':''}">
      <span class="flag">${awayFlag}</span>
      <span class="name">${awayTeam}</span>
      ${isFinished ? `<span class="score-box">${m.away_score ?? '–'}</span>` : ''}
      ${hasPred && !isFinished ? `<span class="score-box" style="color:#86efac">${pred.away_score}</span>` : ''}
    </div>
    ${kickoff && !isFinished ? `<div style="font-size:9px;color:var(--text-muted);margin-top:1px">${kickoff.toLocaleString('es-BO',{timeZone:'America/La_Paz',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>` : ''}
  `;

  if (!isLocked && currentUser && m) {
    card.addEventListener('click', () => openModal(m));
  }
  return card;
}

function buildPlaceholder(label, isFinal = false) {
  const el = document.createElement('div');
  el.style.cssText = `
    background: var(--bg-card); border: 1.5px dashed var(--border);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: ${isFinal?'13px':'10px'}; font-weight: 700; color: var(--text-muted);
    margin: 2px 4px; text-transform: uppercase; letter-spacing: 1px; opacity: .6;
  `;
  el.textContent = isFinal ? '🏆 FINAL' : label;
  return el;
}

let activeMatch = null;

function openModal(m) {
  activeMatch = m;
  const kickoff = getKickoff(m);
  document.getElementById('modalPhase').textContent    = m.phase || 'Octavos';
  document.getElementById('modalHomeFlag').textContent = m.home_flag || '🏳️';
  document.getElementById('modalAwayFlag').textContent = m.away_flag || '🏳️';
  document.getElementById('modalHomeName').textContent = m.home_team;
  document.getElementById('modalAwayName').textContent = m.away_team;
  document.getElementById('modalKickoff').textContent  = kickoff
    ? kickoff.toLocaleString('es-BO',{timeZone:'America/La_Paz',dateStyle:'long',timeStyle:'short'})
    : '';
  document.getElementById('modalCity').textContent  = m.city ? '📍 ' + m.city : '';
  document.getElementById('modalMsg').innerHTML     = '';
  const pred = predictions[m.id];
  document.getElementById('modalHomeScore').value = pred ? pred.home_score : '';
  document.getElementById('modalAwayScore').value = pred ? pred.away_score : '';
  document.getElementById('predModalBg').style.display = 'flex';
  document.getElementById('modalHomeScore').focus();
}

document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('predModalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('predModalBg')) closeModal();
});
function closeModal() {
  document.getElementById('predModalBg').style.display = 'none';
  activeMatch = null;
}

document.getElementById('modalSave').addEventListener('click', async () => {
  if (!activeMatch || !currentUser || !GID) return;
  const hs = parseInt(document.getElementById('modalHomeScore').value);
  const as = parseInt(document.getElementById('modalAwayScore').value);
  if (isNaN(hs) || isNaN(as) || hs < 0 || as < 0) {
    document.getElementById('modalMsg').innerHTML = '<span style="color:#fca5a5">⚠️ Ingresá un marcador válido</span>';
    return;
  }
  const kickoff = getKickoff(activeMatch);
  if (!kickoff || kickoff <= new Date()) {
    document.getElementById('modalMsg').innerHTML = '<span style="color:#94a3b8">🔒 Plazo vencido</span>';
    return;
  }
  const btn = document.getElementById('modalSave');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const predId = `${GID}_${activeMatch.id}_${currentUser.uid}`;
    await setDoc(doc(db,'predictions',predId), {
      group_id:   GID,
      match_id:   activeMatch.id,
      user_uid:   currentUser.uid,
      home_score: hs,
      away_score: as,
      created_at: new Date()
    });
    predictions[activeMatch.id] = { home_score: hs, away_score: as };
    document.getElementById('modalMsg').innerHTML = '<span style="color:#86efac">✅ ¡Pronóstico guardado!</span>';
    btn.textContent = '✏️ Actualizar'; btn.disabled = false;
    setTimeout(() => { renderBracket(); closeModal(); }, 800);
  } catch(err) {
    document.getElementById('modalMsg').innerHTML = `<span style="color:#fca5a5">❌ ${err.message}</span>`;
    btn.textContent = '💾 Guardar'; btn.disabled = false;
  }
});
</script>
</body>
</html>
