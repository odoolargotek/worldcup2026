<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Partidos — WC2026</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .match-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 8px;
      transition: border-color .15s, background .15s;
    }
    .match-row.modified { border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.04); }
    .match-row.saved    { border-color: rgba(52,211,153,0.5); background: rgba(52,211,153,0.04); }
    .match-info { min-width: 0; }
    .match-meta { font-size: 11px; color: var(--text-muted, #94a3b8); margin-top: 4px; }

    /* inputs de equipo */
    .team-flag-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text, #f1f5f9);
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 18px;
      width: 46px;
      text-align: center;
      outline: none;
    }
    .team-name-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text, #f1f5f9);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 700;
      width: 130px;
      outline: none;
    }
    .team-flag-input:focus,
    .team-name-input:focus { border-color: #4aafd4; }

    /* input fecha */
    .dt-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text, #f1f5f9);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      width: 190px;
      outline: none;
      margin-top: 2px;
    }
    .dt-input:focus  { border-color: #4aafd4; }
    .dt-input.dirty  { border-color: #f59e0b; }

    .save-btn {
      background: rgba(52,211,153,0.15);
      color: #34d399;
      border: 1px solid rgba(52,211,153,0.4);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      margin-top: 2px;
    }
    .save-btn:hover    { background: rgba(52,211,153,0.28); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .group-header {
      font-size: 12px; font-weight: 800;
      color: #4aafd4;
      text-transform: capitalize;
      padding: 18px 0 8px;
      border-bottom: 1px solid rgba(74,175,212,0.2);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted, #94a3b8);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(74,175,212,0.15);
      border-color: #4aafd4;
      color: #4aafd4;
    }
    #globalMsg {
      position: fixed; bottom: 24px; right: 24px;
      background: #059669; color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-weight: 700; font-size: 14px;
      display: none; z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    @media (max-width: 600px) {
      .match-row { grid-template-columns: 1fr; }
      .team-name-input { width: 110px; }
      .dt-input { width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar" style="background:linear-gradient(135deg,#0f1a2d,#1a2d4a)!important;border-color:#4aafd4">
    <div class="navbar-brand">
      <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
      <div>
        <div>🗓️ Editar Partidos</div>
        <div class="navbar-powered">Fecha, hora y equipos — Horario Bolivia (UTC−4)</div>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button id="btnSaveAll" class="btn btn-sm" style="background:linear-gradient(135deg,#059669,#34d399);color:#fff;font-weight:700">💾 Guardar todos los cambios</button>
      <a href="admin.html" class="btn btn-outline-light btn-sm">🛠️ Admin</a>
    </div>
  </nav>

  <div class="container py-4" style="max-width:960px">

    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
      <div>
        <h5 style="color:var(--gold);font-weight:800;margin:0">🗓️ Partidos ordenados por fecha</h5>
        <p style="font-size:0.82rem;color:var(--text-muted);margin:4px 0 0">
          Edita fecha, hora y nombres de equipo. Cambios en <span style="color:#f59e0b">naranja</span> = sin guardar.
        </p>
      </div>
      <div id="statsBar" style="font-size:12px;color:var(--text-muted)">Cargando...</div>
    </div>

    <!-- Filtro por grupo -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-group="all">Todos</button>
    </div>

    <!-- Lista de partidos -->
    <div id="matchList">
      <div style="color:var(--text-muted);padding:40px;text-align:center">⏳ Cargando partidos...</div>
    </div>

  </div>

  <div id="globalMsg">✅ Guardado</div>

  <div class="footer-brand">
    <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
    Largotek Transformación Digital
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/admin-kickoffs.js"></script>

</body>
</html>
