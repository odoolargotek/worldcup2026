    const log = document.getElementById('log');
    function addLog(msg, color='white') {
      log.innerHTML += `<div style="color:${color}">${msg}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    async function loadMatches() {
      const user = auth.currentUser;
      if (!user) { addLog('❌ Debes estar logueado', 'red'); return; }
      addLog(`🚀 Cargando ${matches.length} partidos...`, 'yellow');
      let ok = 0;
      for (const m of matches) {
        try {
          await addDoc(collection(db, 'matches'), { ...m, kickoff: new Date(m.kickoff) });
          addLog(`✅ ${m.home_team} vs ${m.away_team} (${m.phase})`, '#90ee90');
          ok++;
        } catch(e) {
          addLog(`❌ Error: ${m.home_team} vs ${m.away_team} — ${e.message}`, 'red');
        }
      }
      addLog(`<br><strong>✅ ${ok}/${matches.length} partidos cargados!</strong>`, '#FFD700');
      addLog(`<a href="admin.html" style="color:#6bc">→ Ir al panel admin</a>`);
    }

    document.getElementById('loadBtn').addEventListener('click', async () => {
      const existing = await getDocs(collection(db, 'matches'));
      if (!existing.empty) {
        addLog(`⚠️ Ya existen ${existing.size} partidos. Usa el botón "Borrar todo y recargar" para resetear.`, 'orange');
        return;
      }
      await loadMatches();
    });

    document.getElementById('deleteBtn').addEventListener('click', async () => {
      if (!confirm('⚠️ ¿Seguro que deseas BORRAR todos los partidos y recargar el fixture?')) return;
      const user = auth.currentUser;
      if (!user) { addLog('❌ Debes estar logueado', 'red'); return; }
      addLog('🗑️ Borrando partidos existentes...', 'orange');
      const snap = await getDocs(collection(db, 'matches'));
      let del = 0;
      for (const d of snap.docs) {
        await deleteDoc(doc(db, 'matches', d.id));
        del++;
      }
      addLog(`✅ ${del} partidos borrados. Recargando...`, 'yellow');
      await loadMatches();
    });
