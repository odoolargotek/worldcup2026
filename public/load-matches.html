    const log = document.getElementById('log');
    function addLog(msg, color = 'white') {
      log.innerHTML += `<div style="color:${color}">${msg}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    document.getElementById('loadBtn').addEventListener('click', async () => {
      // Verificar auth
      const user = auth.currentUser;
      if (!user) { addLog('❌ Debes estar logueado', 'red'); return; }

      // Verificar si ya hay partidos
      const existing = await getDocs(collection(db, 'matches'));
      if (!existing.empty) {
        addLog(`⚠️ Ya existen ${existing.size} partidos en Firestore. Borra la colección manualmente si quieres recargar.`, 'orange');
        return;
      }

      addLog(`🚀 Cargando ${matches.length} partidos...`, 'yellow');
      let ok = 0;
      for (const m of matches) {
        try {
          await addDoc(collection(db, 'matches'), {
            ...m,
            kickoff: new Date(m.kickoff)
          });
          addLog(`✅ ${m.home_team} vs ${m.away_team} (${m.phase})`, '#90ee90');
          ok++;
        } catch(e) {
          addLog(`❌ Error: ${m.home_team} vs ${m.away_team} — ${e.message}`, 'red');
        }
      }
      addLog(`<br><strong>✅ ${ok}/${matches.length} partidos cargados exitosamente!</strong>`, '#FFD700');
      addLog(`<a href="admin.html" style="color:#6bc">→ Ir al panel admin</a>`);
    });
