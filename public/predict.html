<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronóstico — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-dark bg-success px-3">
    <a id="backLink" href="group.html" class="navbar-brand">← Grupo</a>
  </nav>

  <div class="container py-4" style="max-width:480px">
    <div class="card bg-secondary p-4 text-center">

      <h5 id="matchPhase" class="text-warning small mb-1"></h5>
      <div class="d-flex justify-content-center align-items-center gap-4 my-3">
        <div class="text-center">
          <div id="homeFlag" class="display-4"></div>
          <div id="homeName" class="fw-bold"></div>
        </div>
        <span class="display-5">vs</span>
        <div class="text-center">
          <div id="awayFlag" class="display-4"></div>
          <div id="awayName" class="fw-bold"></div>
        </div>
      </div>

      <p id="matchKickoff" class="text-muted small"></p>

      <form id="predictForm">
        <div class="d-flex justify-content-center gap-3 my-3">
          <div class="text-center">
            <label class="small">Local</label>
            <input type="number" id="homeScore" min="0" max="20" class="form-control text-center" style="width:70px" required>
          </div>
          <div class="text-center">
            <label class="small">Visita</label>
            <input type="number" id="awayScore" min="0" max="20" class="form-control text-center" style="width:70px" required>
          </div>
        </div>
        <button type="submit" id="submitPrediction" class="btn btn-success w-100">Guardar pronóstico</button>
      </form>

      <div id="predictMsg" class="mt-3"></div>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/predictions.js"></script>
</body>
</html>
