<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronóstico — WC2026</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6W7JNJCG36"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6W7JNJCG36');
  </script>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sponsor.css">
  <style>
    @keyframes pulse-red {
      0%,100% { opacity:1; }
      50%      { opacity:0.6; }
    }
    .pulse-red { animation: pulse-red 1.2s infinite; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <!-- Logo patrocinador inyectado por sponsor-config.js -->
      <div>
        <div>⚽ WC2026 — Pronóstico</div>
        <div class="navbar-powered">by Largotek</div>
      </div>
    </div>
    <a id="backLink" href="group.html" class="btn btn-outline-light btn-sm">← Volver</a>
  </nav>

  <!-- Banner patrocinador inyectado automáticamente -->

  <div class="container py-4" style="max-width:500px">
    <div id="deadlineBanner" class="d-none mb-3"></div>
    <div class="card p-4 text-center">
      <div id="matchPhase" class="mb-1" style="color:var(--gold);font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px"></div>
      <div class="d-flex justify-content-center align-items-center gap-4 my-3">
        <div class="text-center">
          <div id="homeFlag" style="font-size:3.5rem;line-height:1"></div>
          <div id="homeName" style="font-weight:700;font-size:1rem;margin-top:6px"></div>
        </div>
        <div style="color:var(--text-muted);font-size:1.1rem;font-weight:500">vs</div>
        <div class="text-center">
          <div id="awayFlag" style="font-size:3.5rem;line-height:1"></div>
          <div id="awayName" style="font-weight:700;font-size:1rem;margin-top:6px"></div>
        </div>
      </div>
      <div id="matchKickoff" class="mb-1" style="font-size:1.1rem;font-weight:700;color:var(--text)"></div>
      <div id="matchCity" class="mb-3" style="font-size:0.85rem;color:var(--text-muted)"></div>
      <div id="deadlineCountdown" class="mb-4"></div>

      <!-- Sugerencia Perplexity AI -->
      <div id="perplexitySuggestContainer" class="mb-2 text-start"></div>

      <form id="predictForm">
        <div class="d-flex justify-content-center gap-4 mb-4">
          <div class="text-center">
            <label class="form-label">Local</label>
            <input type="number" id="homeScore" min="0" max="20" class="form-control score-input" required>
          </div>
          <div class="d-flex align-items-end pb-2" style="color:var(--text-muted);font-size:1.5rem">-</div>
          <div class="text-center">
            <label class="form-label">Visita</label>
            <input type="number" id="awayScore" min="0" max="20" class="form-control score-input" required>
          </div>
        </div>
        <button type="submit" id="submitPrediction" class="btn btn-success w-100 py-2" style="font-size:1rem;font-weight:700">
          💾 Guardar pronóstico
        </button>
      </form>
      <div id="predictMsg" class="mt-3"></div>
    </div>
    <div class="text-center mt-3" style="color:var(--text-muted);font-size:12px">
      🔮 Score exacto = <strong style="color:var(--gold)">6pts</strong>
      &nbsp;·&nbsp;
      ✅ Resultado correcto = <strong style="color:var(--green-light)">3pts</strong>
      &nbsp;·&nbsp;
      ❌ Fallo = 0pts
    </div>
  </div>

  <div class="footer-brand">
    ⚽ WC2026 &nbsp;— Desarrollado por
    <strong style="color:var(--primary-light)">Largotek</strong>
    <div style="margin-top:6px;font-size:10px;color:rgba(148,163,184,0.4)">
      Juego de entretenimiento privado — No es un sitio de apuestas —
      <a href="legal.html" target="_blank" style="color:rgba(148,163,184,0.4);text-decoration:underline">Términos de uso</a>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/predictions.js"></script>
  <script type="module">
    import { injectSponsor } from './js/sponsor-config.js';
    injectSponsor();
  </script>
</body>
</html>
