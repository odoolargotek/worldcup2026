<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fix Kickoffs R32 — WC2026</title>
  <link rel="icon" href="data:,">
  <style>
    body { background:#0f1a2d; color:#f1f5f9; font-family:monospace; padding:30px; }
    h2 { color:#4aafd4; }
    .log { background:#1a2d4a; border-radius:10px; padding:20px; margin-top:20px; max-height:70vh; overflow-y:auto; }
    .ok  { color:#34d399; }
    .err { color:#f87171; }
    .skip{ color:#94a3b8; }
    button { background:#059669; color:#fff; border:none; border-radius:8px; padding:12px 28px; font-size:16px; font-weight:700; cursor:pointer; margin-top:20px; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <h2>🔧 Fix Kickoffs Ronda de 32 — Hora Bolivia</h2>
  <p style="color:#94a3b8">Corrige los 15 partidos R32 al horario Bolivia correcto. Busca por nombre de equipo; si no encuentra, busca por ciudad + fecha.</p>
  <button id="btnRun">▶️ Ejecutar corrección</button>
  <div class="log" id="log"><em style="color:#94a3b8">Esperando...</em></div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import {
      collection, getDocs, updateDoc, doc, Timestamp
    } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

    function boliviaToUTC(y, mo, d, h, mi) {
      return new Date(Date.UTC(y, mo - 1, d, h + 4, mi));
    }

    // city_aliases: variantes del nombre de ciudad en Firestore
    const FIXES = [
      { home:'Brasil',         away:'Japón',               y:2026,mo:6,d:29,h:13,mi:0,  city_aliases:['houston'] },
      { home:'Alemania',       away:'Paraguay',            y:2026,mo:6,d:29,h:16,mi:30, city_aliases:['boston'] },
      { home:'Países Bajos',   away:'Marruecos',           y:2026,mo:6,d:29,h:21,mi:0,  city_aliases:['monterrey'] },
      { home:'Costa de Marfil',away:'Noruega',             y:2026,mo:6,d:30,h:13,mi:0,  city_aliases:['dallas'] },
      { home:'Francia',        away:'Suecia',              y:2026,mo:6,d:30,h:17,mi:0,  city_aliases:['new york','nueva york','east rutherford','new jersey'] },
      { home:'México',         away:'Ecuador',             y:2026,mo:6,d:30,h:21,mi:0,  city_aliases:['ciudad de mexico','mexico city','ciudad de méxico'] },
      { home:'Inglaterra',     away:'RD Congo',            y:2026,mo:7, d:1, h:12,mi:0, city_aliases:['atlanta'] },
      { home:'Bélgica',        away:'Senegal',             y:2026,mo:7, d:1, h:16,mi:0, city_aliases:['seattle'] },
      { home:'Estados Unidos', away:'Bosnia y Herzegovina',y:2026,mo:7, d:1, h:20,mi:0, city_aliases:['san francisco','bay area','santa clara'] },
      { home:'España',         away:'Austria',             y:2026,mo:7, d:2, h:15,mi:0, city_aliases:['los angeles','los ángeles','inglewood','sofi'] },
      { home:'Portugal',       away:'Croacia',             y:2026,mo:7, d:2, h:19,mi:0, city_aliases:['vancouver'] },
      { home:'Suiza',          away:'Argelia',             y:2026,mo:7, d:2, h:23,mi:0, city_aliases:['vancouver'] },
      { home:'Australia',      away:'Egipto',              y:2026,mo:7, d:3, h:14,mi:0, city_aliases:['dallas'] },
      { home:'Argentina',      away:'Cabo Verde',          y:2026,mo:7, d:3, h:18,mi:0, city_aliases:['miami','miami gardens'] },
      { home:'Colombia',       away:'Ghana',               y:2026,mo:7, d:3, h:21,mi:30, city_aliases:['kansas city'] },
    ];

    const logEl = document.getElementById('log');
    const btn   = document.getElementById('btnRun');

    function log(msg, cls='') {
      logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function norm(str) {
      return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    }
    function matchesAny(val, aliases) {
      const v = norm(val);
      return aliases.some(a => v.includes(norm(a)) || norm(a).includes(v));
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      logEl.innerHTML = '';
      log('🔍 Cargando partidos de Firestore...');

      const snap = await getDocs(collection(db, 'matches'));
      const allMatches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      log(`📊 ${allMatches.length} partidos cargados`);

      const r32 = allMatches.filter(m =>
        (m.phase||'').toLowerCase().includes('32') ||
        (m.type||'').toLowerCase().includes('32')
      );
      log(`🎯 Ronda de 32 detectados: ${r32.length}`);

      let fixed = 0, skipped = 0, notFound = 0, errors = 0;

      for (const fix of FIXES) {
        const targetUTC = boliviaToUTC(fix.y, fix.mo, fix.d, fix.h, fix.mi);
        // Ventana de ±12 horas para buscar por ciudad+fecha
        const windowMs = 12 * 60 * 60 * 1000;

        // 1º intento: buscar por nombre de equipo en R32
        let match = r32.find(m =>
          matchesAny(m.home_team, [fix.home]) && matchesAny(m.away_team, [fix.away])
        );

        // 2º intento: buscar por ciudad + fase R32 + fecha cercana (±12h)
        if (!match) {
          match = r32.find(m => {
            if (!matchesAny(m.city||'', fix.city_aliases)) return false;
            const ko = m.kickoff?.toDate ? m.kickoff.toDate() : new Date(m.kickoff);
            return Math.abs(ko - targetUTC) < windowMs;
          });
        }

        // 3º intento: ciudad + fecha en todos los partidos
        if (!match) {
          match = allMatches.find(m => {
            if (!matchesAny(m.city||'', fix.city_aliases)) return false;
            const ko = m.kickoff?.toDate ? m.kickoff.toDate() : new Date(m.kickoff);
            return Math.abs(ko - targetUTC) < windowMs;
          });
        }

        const label = `${fix.home} vs ${fix.away} (${fix.city_aliases[0]})`;

        if (!match) {
          log(`⚠️ NO ENCONTRADO: ${label}`, 'skip');
          notFound++;
          continue;
        }

        const newKickoff = targetUTC;
        const oldKickoff = match.kickoff?.toDate ? match.kickoff.toDate() : new Date(match.kickoff);
        const diffMs = Math.abs(newKickoff - oldKickoff);

        if (diffMs < 60000) {
          log(`✓ Ya correcto: ${match.home_team||'?'} vs ${match.away_team||'?'} • ${fix.city_aliases[0]}`, 'skip');
          skipped++;
          continue;
        }

        try {
          await updateDoc(doc(db, 'matches', match.id), {
            kickoff: Timestamp.fromDate(newKickoff)
          });
          const fmtOpts = { timeZone:'America/La_Paz', hour12:true, day:'2-digit', month:'short', hour:'numeric', minute:'2-digit' };
          const oldStr = oldKickoff.toLocaleString('es-BO', fmtOpts);
          const newStr = newKickoff.toLocaleString('es-BO', fmtOpts);
          log(`✅ ${match.home_team||'?'} vs ${match.away_team||'?'} • ${match.city||fix.city_aliases[0]}<br>&nbsp;&nbsp;&nbsp;${oldStr} → <strong>${newStr}</strong>`, 'ok');
          fixed++;
        } catch(e) {
          log(`❌ ERROR ${label}: ${e.message}`, 'err');
          errors++;
        }
      }

      log(`<br>🏁 <strong>Resultado: ${fixed} corregidos • ${skipped} sin cambio • ${notFound} no encontrados • ${errors} errores</strong>`);
      btn.disabled = false;
      btn.textContent = '🔄 Volver a ejecutar';
    });
  </script>
</body>
</html>
