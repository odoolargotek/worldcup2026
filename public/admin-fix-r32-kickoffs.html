<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fix Kickoffs R32 — WC2026</title>
  <link rel="icon" href="data:,">
  <style>
    body { background:#0f1a2d; color:#f1f5f9; font-family:monospace; padding:30px; }
    h2 { color:#4aafd4; }
    .log { background:#1a2d4a; border-radius:10px; padding:20px; margin-top:20px; max-height:70vh; overflow-y:auto; }
    .ok  { color:#34d399; }
    .err { color:#f87171; }
    .skip{ color:#94a3b8; }
    button { background:#059669; color:#fff; border:none; border-radius:8px; padding:12px 28px; font-size:16px; font-weight:700; cursor:pointer; margin-top:20px; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <h2>🔧 Fix Kickoffs Ronda de 32 — Hora Bolivia</h2>
  <p style="color:#94a3b8">Corrige los 15 partidos de Ronda de 32 al horario Bolivia (UTC-4) correcto según livescore. Solo actualiza los que tienen hora diferente.</p>
  <button id="btnRun">▶️ Ejecutar corrección</button>
  <div class="log" id="log"><em style="color:#94a3b8">Esperando...</em></div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import {
      collection, getDocs, updateDoc, doc, Timestamp
    } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

    // Bolivia = UTC-4 fijo, sin DST. Sumar 4h para obtener UTC.
    function boliviaToUTC(y, mo, d, h, mi) {
      return new Date(Date.UTC(y, mo - 1, d, h + 4, mi));
    }

    // aliases: variantes posibles del nombre en Firestore
    const FIXES = [
      { aliases_home:['brasil'],                        aliases_away:['japon','japan'],                  y:2026,mo:6,d:29,h:13,mi:0  },
      { aliases_home:['alemania','germany'],            aliases_away:['paraguay'],                       y:2026,mo:6,d:29,h:16,mi:30 },
      { aliases_home:['paises bajos','netherlands','holanda'], aliases_away:['marruecos','morocco'],     y:2026,mo:6,d:29,h:21,mi:0  },
      { aliases_home:['costa de marfil','ivory coast'], aliases_away:['noruega','norway'],               y:2026,mo:6,d:30,h:13,mi:0  },
      { aliases_home:['francia','france'],              aliases_away:['suecia','sweden'],                y:2026,mo:6,d:30,h:17,mi:0  },
      { aliases_home:['mexico','m\u00e9xico'],          aliases_away:['ecuador'],                        y:2026,mo:6,d:30,h:21,mi:0  },
      { aliases_home:['inglaterra','england'],          aliases_away:['rd congo','congo','republica democratica'], y:2026,mo:7,d:1,h:12,mi:0 },
      { aliases_home:['belgica','b\u00e9lgica','belgium'], aliases_away:['senegal'],                     y:2026,mo:7,d:1, h:16,mi:0  },
      { aliases_home:['estados unidos','usa','united states','ee.uu.'], aliases_away:['bosnia','herzegovina'], y:2026,mo:7,d:1,h:20,mi:0 },
      { aliases_home:['espa\u00f1a','spain'],           aliases_away:['austria'],                        y:2026,mo:7,d:2, h:15,mi:0  },
      { aliases_home:['portugal'],                     aliases_away:['croacia','croatia'],               y:2026,mo:7,d:2, h:19,mi:0  },
      { aliases_home:['suiza','switzerland'],          aliases_away:['argelia','algeria'],               y:2026,mo:7,d:2, h:23,mi:0  },
      { aliases_home:['australia'],                    aliases_away:['egipto','egypt'],                  y:2026,mo:7,d:3, h:14,mi:0  },
      { aliases_home:['argentina'],                    aliases_away:['cabo verde','cape verde'],         y:2026,mo:7,d:3, h:18,mi:0  },
      { aliases_home:['colombia'],                     aliases_away:['ghana'],                           y:2026,mo:7,d:3, h:21,mi:30 },
    ];

    const logEl = document.getElementById('log');
    const btn   = document.getElementById('btnRun');

    function log(msg, cls='') {
      logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function norm(str) {
      return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    }

    function matchesAny(val, aliases) {
      const v = norm(val);
      return aliases.some(a => v.includes(norm(a)) || norm(a).includes(v));
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      logEl.innerHTML = '';
      log('🔍 Cargando partidos de Firestore...');

      const snap = await getDocs(collection(db, 'matches'));
      const allMatches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      log(`📊 ${allMatches.length} partidos cargados`);

      // Solo Ronda de 32
      const r32 = allMatches.filter(m =>
        (m.phase||'').toLowerCase().includes('32') ||
        (m.type||'').toLowerCase().includes('32') ||
        (m.phase||'').toLowerCase().includes('ronda')
      );
      log(`🎯 Partidos Ronda de 32 detectados: ${r32.length}`);

      let fixed = 0, skipped = 0, notFound = 0, errors = 0;

      for (const fix of FIXES) {
        // Buscar primero en R32, si no en todos
        let match = r32.find(m =>
          matchesAny(m.home_team, fix.aliases_home) &&
          matchesAny(m.away_team, fix.aliases_away)
        );
        if (!match) {
          match = allMatches.find(m =>
            matchesAny(m.home_team, fix.aliases_home) &&
            matchesAny(m.away_team, fix.aliases_away)
          );
        }

        const label = `${fix.aliases_home[0]} vs ${fix.aliases_away[0]}`;

        if (!match) {
          log(`⚠️ NO ENCONTRADO: ${label}`, 'skip');
          notFound++;
          continue;
        }

        const newKickoff = boliviaToUTC(fix.y, fix.mo, fix.d, fix.h, fix.mi);
        const oldKickoff = match.kickoff?.toDate ? match.kickoff.toDate() : new Date(match.kickoff);
        const diffMs = Math.abs(newKickoff - oldKickoff);

        if (diffMs < 60000) {
          log(`✓ Ya correcto: ${match.home_team} vs ${match.away_team}`, 'skip');
          skipped++;
          continue;
        }

        try {
          await updateDoc(doc(db, 'matches', match.id), {
            kickoff: Timestamp.fromDate(newKickoff)
          });
          const fmtOpts = { timeZone:'America/La_Paz', hour12:true, day:'2-digit', month:'short', hour:'numeric', minute:'2-digit' };
          const oldStr = oldKickoff.toLocaleString('es-BO', fmtOpts);
          const newStr = newKickoff.toLocaleString('es-BO', fmtOpts);
          log(`✅ ${match.home_team} vs ${match.away_team}<br>&nbsp;&nbsp;&nbsp;${oldStr} → <strong>${newStr}</strong>`, 'ok');
          fixed++;
        } catch(e) {
          log(`❌ ERROR ${match.home_team} vs ${match.away_team}: ${e.message}`, 'err');
          errors++;
        }
      }

      log(`<br>🏁 <strong>Resultado: ${fixed} corregidos • ${skipped} sin cambio • ${notFound} no encontrados • ${errors} errores</strong>`);
      btn.disabled = false;
      btn.textContent = '🔄 Volver a ejecutar';
    });
  </script>
</body>
</html>
