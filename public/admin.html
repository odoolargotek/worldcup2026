<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-dark bg-danger px-3">
    <span class="navbar-brand">🛠 Admin — WC2026</span>
    <a href="dashboard.html" class="btn btn-outline-light btn-sm">← Dashboard</a>
  </nav>

  <div class="container py-4">
    <h5>Cargar Resultado de Partido</h5>

    <div class="card bg-secondary p-3 mb-4">
      <div class="mb-2">
        <label class="form-label small">Seleccionar partido</label>
        <select id="matchSelect" class="form-select"></select>
      </div>
      <div class="d-flex gap-3 mb-3">
        <div>
          <label class="form-label small">Goles Local</label>
          <input type="number" id="resultHome" min="0" class="form-control" style="width:80px">
        </div>
        <div>
          <label class="form-label small">Goles Visita</label>
          <input type="number" id="resultAway" min="0" class="form-control" style="width:80px">
        </div>
      </div>
      <button id="saveResultBtn" class="btn btn-warning">Guardar resultado y calcular puntos</button>
      <div id="adminMsg" class="mt-2"></div>
    </div>

    <h5>Cargar Partido</h5>
    <div class="card bg-secondary p-3">
      <div class="row g-2">
        <div class="col-6">
          <input type="text" id="newHomeTeam" class="form-control" placeholder="Equipo local">
        </div>
        <div class="col-6">
          <input type="text" id="newAwayTeam" class="form-control" placeholder="Equipo visita">
        </div>
        <div class="col-6">
          <input type="datetime-local" id="newKickoff" class="form-control">
        </div>
        <div class="col-6">
          <select id="newPhase" class="form-select">
            <option>Fase de Grupos</option>
            <option>Octavos</option>
            <option>Cuartos</option>
            <option>Semis</option>
            <option>Final</option>
          </select>
        </div>
        <div class="col-12">
          <button id="addMatchBtn" class="btn btn-primary w-100">Agregar Partido</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
