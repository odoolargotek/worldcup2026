<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — WC2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar" style="background:linear-gradient(135deg,#2d0f0f,#4a1a1a) !important;border-color:#ef4444">
    <div class="navbar-brand">
      <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
      <div>
        <div>🛠️ Admin — WC2026</div>
        <div class="navbar-powered">Panel de administración</div>
      </div>
    </div>
    <a href="dashboard.html" class="btn btn-outline-light btn-sm">← Dashboard</a>
  </nav>

  <div class="container py-4">

    <div class="row g-4">
      <!-- Cargar resultado -->
      <div class="col-md-6">
        <div class="card p-4">
          <h6 style="color:var(--gold);font-weight:700" class="mb-3">🏆 Cargar Resultado</h6>
          <label class="form-label">Partido</label>
          <select id="matchSelect" class="form-select mb-3"></select>
          <div class="d-flex gap-3 mb-3">
            <div>
              <label class="form-label">Goles Local</label>
              <input type="number" id="resultHome" min="0" class="form-control score-input">
            </div>
            <div class="d-flex align-items-end pb-2" style="color:var(--text-muted);font-size:1.5rem">-</div>
            <div>
              <label class="form-label">Goles Visita</label>
              <input type="number" id="resultAway" min="0" class="form-control score-input">
            </div>
          </div>
          <button id="saveResultBtn" class="btn btn-warning w-100">
            ✅ Guardar y calcular puntos
          </button>
          <div id="adminMsg" class="mt-3"></div>
        </div>
      </div>

      <!-- Agregar partido -->
      <div class="col-md-6">
        <div class="card p-4">
          <h6 style="color:var(--green-light);font-weight:700" class="mb-3">➕ Agregar Partido</h6>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label">Equipo local</label>
              <input type="text" id="newHomeTeam" class="form-control" placeholder="Ej: Brasil">
            </div>
            <div class="col-6">
              <label class="form-label">Equipo visita</label>
              <input type="text" id="newAwayTeam" class="form-control" placeholder="Ej: Argentina">
            </div>
            <div class="col-6">
              <label class="form-label">Fecha y hora</label>
              <input type="datetime-local" id="newKickoff" class="form-control">
            </div>
            <div class="col-6">
              <label class="form-label">Fase</label>
              <select id="newPhase" class="form-select">
                <option>Grupo A</option><option>Grupo B</option><option>Grupo C</option>
                <option>Grupo D</option><option>Grupo E</option><option>Grupo F</option>
                <option>Grupo G</option><option>Grupo H</option><option>Grupo I</option>
                <option>Grupo J</option><option>Grupo K</option><option>Grupo L</option>
                <option>Grupo M</option><option>Grupo N</option>
                <option>Octavos</option><option>Cuartos</option>
                <option>Semifinal</option><option>Final</option>
              </select>
            </div>
            <div class="col-12">
              <button id="addMatchBtn" class="btn btn-success w-100 mt-1">Agregar partido</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-brand">
    <img src="https://www.largotek.com/web/image/website/2/logo/www.largotek.com?unique=276cda1" alt="Largotek">
    Largotek Transformación Digital
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
