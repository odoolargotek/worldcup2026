<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Migrar type de partidos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container py-5" style="max-width:600px">
  <h4 style="color:var(--gold);font-weight:800">🔧 Migrar campo <code>type</code> en partidos</h4>
  <p style="color:var(--text-muted);font-size:14px">
    Este script recorre <strong>todos los partidos</strong> en Firestore y asigna el campo <code>type</code>:<br>
    <code>phase</code> empieza con "Grupo" → <strong>fase_grupos</strong><br>
    de lo contrario → <strong>eliminacion</strong>
  </p>
  <p style="color:#f5a0ac;font-size:13px">⚠️ Solo partidos sin <code>type</code> serán actualizados. Los que ya lo tienen se saltarán.</p>
  <button id="btnRun" class="btn btn-warning fw-bold">🚀 Ejecutar migración</button>
  <div id="log" style="margin-top:20px;font-family:monospace;font-size:13px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;white-space:pre-wrap;min-height:80px;color:var(--text)">Listo para migrar...</div>
</div>

<script type="module">
import { db } from './js/firebase-config.js';
import { collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const log = document.getElementById('log');
function appendLog(msg) { log.textContent += '\n' + msg; }

document.getElementById('btnRun').addEventListener('click', async () => {
  document.getElementById('btnRun').disabled = true;
  log.textContent = '⏳ Iniciando...';

  const snap = await getDocs(collection(db, 'matches'));
  let updated = 0, skipped = 0;

  for (const d of snap.docs) {
    const m = d.data();
    if (m.type) { skipped++; continue; }
    const type = (m.phase || '').startsWith('Grupo') ? 'fase_grupos' : 'eliminacion';
    await updateDoc(doc(db, 'matches', d.id), { type });
    appendLog(`✅ ${m.home_team} vs ${m.away_team} (${m.phase}) → ${type}`);
    updated++;
  }

  appendLog(`\n✔️ Migración completa: ${updated} actualizados, ${skipped} ya tenían type.`);
  document.getElementById('btnRun').disabled = false;
});
</script>
</body>
</html>
